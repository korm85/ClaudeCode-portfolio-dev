        - text: How I Work
        - heading "An AI-native PM practice" [level=2] [ref=e180]
        - paragraph [ref=e181]: I run a multi-agent workspace that compresses the time from customer signal to shipped feature. Specialized AI tools handle discovery, spec drafting, prototyping, and competitive research in parallel.
      - generic [ref=e182]:
        - generic [ref=e183]:
          - img [ref=e184]
          - heading "Discovery & specs" [level=3] [ref=e187]
          - paragraph [ref=e188]: I pulled customer support data and Jira history into a single view before writing the AMVero alerting spec — and caught a threshold conflict that would have shipped an alert operators couldn't act on.
        - generic [ref=e189]:
          - img [ref=e190]
          - heading "Prototyping" [level=3] [ref=e194]
          - paragraph [ref=e195]: I built the AMVero alert flow as an interactive prototype before engineering started. Operators flagged the rule-creation UX in testing — we shipped a cleaner design in release 1 instead of fixing it in release 3.
        - generic [ref=e196]:
          - img [ref=e197]
          - heading "Hermes PM agent" [level=3] [ref=e201]
          - paragraph [ref=e202]: A custom AI agent monitors competitor product updates and pricing moves weekly. When a competitor claimed predictive defect detection, I had a verified technical rebuttal ready before the sales team asked for one.
        - generic [ref=e203]:
          - img [ref=e204]
          - heading "Support intelligence" [level=3] [ref=e206]
          - paragraph [ref=e207]: "Reading across hundreds of support tickets at once surfaced a pattern: operators weren't struggling with detection — they were struggling with alert fatigue. That finding repositioned the entire Smart Alerting roadmap."
      - paragraph [ref=e208]: "The result: faster cycles from customer signal to validated prototype to shipped feature."
